    <path d="M418 585c0-20 11-36 24-36s24 16 24 36v45h-48v-45z" fill="url(#fox)" stroke="#8D77C4" stroke-width="7"/>
    <path d="M485 585c0-20 11-36 24-36s24 16 24 36v45h-48v-45z" fill="url(#fox)" stroke="#8D77C4" stroke-width="7"/>
