<svg width="900" height="900" viewBox="0 0 900 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEFCFF"/>
      <stop offset="100%" stop-color="#F7F4FF"/>
    </linearGradient>
    <linearGradient id="planet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DCCDF8"/>
      <stop offset="100%" stop-color="#C8B1EE"/>
    </linearGradient>
    <linearGradient id="fox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEECF"/>
      <stop offset="100%" stop-color="#F6DEB8"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="200%" height="200%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#BCAAE4" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="900" height="900" rx="54" fill="url(#bg)"/>

  <!-- dreamy clouds -->
  <g fill="#DCECF6" opacity="0.95">
    <path d="M105 210c0-31 24-56 55-56 20 0 37 10 47 26 7-3 15-5 24-5 31 0 56 25 56 56H105z"/>
