    <path d="M86 612c0-30 24-55 55-55 20 0 36 10 47 25 7-3 15-5 24-5 31 0 56 25 56 56H86z"/>
    <path d="M560 632c0-30 24-55 55-55 20 0 36 10 47 25 7-3 15-5 24-5 31 0 56 25 56 56H560z"/>
    <path d="M278 744c0-27 22-49 49-49 18 0 32 8 41 21 6-3 13-4 21-4 27 0 49 22 49 49H278z" opacity="0.78"/>
  </g>

  <g fill="#DED7F3" opacity="0.95">
