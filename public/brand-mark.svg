    <path d="M610 358c0-30 24-54 54-54 19 0 34 9 44 24 7-3 15-5 23-5 30 0 54 24 54 54H610z"/>
    <path d="M486 760c0-26 21-47 47-47 16 0 30 7 38 19 6-2 12-4 19-4 26 0 47 21 47 47H486z" opacity="0.85"/>
  </g>

  <!-- stars and moon -->
  <g fill="#D8D1F0">
    <circle cx="250" cy="108" r="6"/>
    <circle cx="320" cy="86" r="9"/>
    <circle cx="518" cy="130" r="7"/>
    <circle cx="718" cy="218" r="8"/>
    <circle cx="142" cy="504" r="8"/>
    <circle cx="760" cy="530" r="8"/>
    <circle cx="364" cy="776" r="7"/>
  </g>
  <g fill="#EAF4FF">
    <circle cx="208" cy="146" r="7"/>
    <circle cx="664" cy="134" r="7"/>
    <circle cx="780" cy="322" r="7"/>
    <circle cx="84" cy="584" r="7"/>
    <circle cx="216" cy="710" r="6"/>
  </g>
  <path d="M724 250c-41 0-74 33-74 74 0 37 27 68 62 73-15-11-25-29-25-49 0-33 27-60 60-60 20 0 38 10 49 25-5-35-36-63-72-63z" fill="#D9CFF2" stroke="#9F88D6" stroke-width="8"/>

  <!-- planet and ring -->
  <g filter="url(#shadow)">
    <circle cx="460" cy="610" r="155" fill="url(#planet)"/>
    <circle cx="460" cy="610" r="155" stroke="#9E85D5" stroke-width="8"/>
    <ellipse cx="458" cy="614" rx="250" ry="66" transform="rotate(-14 458 614)" fill="#F6F1FF" stroke="#9E85D5" stroke-width="10"/>
  </g>

