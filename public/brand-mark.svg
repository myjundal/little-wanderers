    <path d="M401 395l-39-72 72 34-33 38z" fill="url(#fox)" stroke="#8D77C4" stroke-width="8"/>
    <path d="M521 395l39-72-72 34 33 38z" fill="url(#fox)" stroke="#8D77C4" stroke-width="8"/>

